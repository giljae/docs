name: Wiki Update

on:
  push:
    branches:
      - main
    paths:
      - "0.Sources/**"

jobs:
  update-wiki:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Install system dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y poppler-utils

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: pip install requests python-docx

      - name: Run wiki update
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DEEPSEEK_MODEL: deepseek-chat
          GITHUB_WORKSPACE: ${{ github.workspace }}
        run: python .github/scripts/wiki_update.py

      - name: Commit wiki changes
        run: |
          git config user.name "wiki-bot"
          git config user.email "wiki-bot@users.noreply.github.com"
          git add 1.Wiki/
          if git diff --staged --quiet; then
            echo "No wiki changes to commit."
          else
            git commit -m "chore: auto-update wiki from sources [skip ci]"
            git push
          fi
